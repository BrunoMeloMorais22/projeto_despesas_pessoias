<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/despesas.css">
    <title>Tela de Cadastro</title>
</head>
<body>

    <div class="container">
    <div class="card">

        <h1>Cadastrar Despesa</h1>
        <p class="subtitle">
            Registre suas despesas financeiras
        </p>

        <form id="expenseForm">

            <div class="form-group">
                <label>Descrição</label>
                <input type="text" id="descricao">
            </div>

            <div class="form-group">
                <label>Valor</label>
                <input type="number" id="valor">
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select id="categoria">
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Lazer</option>
                    <option>Saúde</option>
                    <option>Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label>Data</label>
                <input type="date" id="data">
            </div>

            <button type="submit">
                Salvar Despesa
            </button>

            <a href="dashboard.html">Ir para o dashboard</a>
            <p id="mensagem"></p>
        </form>

    </div>
</div>

    <script src="../javascript/script.js"></script>
</body>
</html>
